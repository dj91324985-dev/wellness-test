  inflammation: {good:false,emoji:"🔥",name:'"염증 루프형"',label:"높은 확률로 당신은",desc:"피부가 몸속 문제를 대신 말해주고 있는 타입이에요.",symptoms:["피부 트러블","두피 문제","스트레스 시 악화"],issues:["장-피부 염증 연결","전신 염증 사이토카인","항산화 방어 저하"]},
  sleep: {good:false,emoji:"🌙",name:'"수면 리듬 역전형"',label:"높은 확률로 당신은",desc:"자도 잔 것 같지 않은, 회복이 안 되는 수면의 타입이에요.",symptoms:["잠들기 어려움","새벽 각성","아침 극도 피로"],issues:["멜라토닌 분비 지연","코르티솔 야간 잔류","회복 수면 부족"]},
  asset: {good:true,emoji:"🌱",name:'"건강관리 우수형"',label:"당신은",desc:"지금까지 꾸준히 잘 관리해온 타입이에요. 그 노력이 몸에 쌓이고 있어요.",goodTitle:"지금까지 정말 잘 해왔어요 👏",goodDesc:"큰 문제 없이 건강을 유지하고 있다는 건 쉬운 일이 아니에요. 지금의 좋은 습관을 유지하면서, 내 몸에 더 정밀하게 맞는 관리법을 찾으면 훨씬 더 나아질 수 있어요."},
  optimized: {good:true,emoji:"✨",name:'"웰니스 최적화형"',label:"당신은",desc:"건강 관리를 잘 하고 있는 타입이에요. 지금 패턴을 더 정밀하게 튜닝할 준비가 된 상태예요.",goodTitle:"건강 관리, 이미 잘 하고 있어요 ✨",goodDesc:"전반적으로 균형이 잡혀 있어요. 지금의 좋은 상태를 유지하면서 개인 맞춤 영양과 루틴을 더해가면, 지금보다 훨씬 더 좋아질 수 있어요."}
};

var cur = 0;
var hist = [];
var sc = {cortisol:0,gut:0,autonomic:0,blood_sugar:0,mito:0,histamine:0,inflammation:0,sleep:0,asset:0,optimized:0};

function render() {
  var q = qs[cur];
  document.getElementById('q-count').textContent = (cur+1) + ' / ' + qs.length;
  document.getElementById('prog-bar').style.width = (((cur+1)/qs.length)*100) + '%';
  document.getElementById('q-category').textContent = q.cat;
  document.getElementById('q-text').textContent = q.text;
  var bb = document.getElementById('back-btn');
  bb.disabled = cur === 0;
  bb.style.opacity = cur === 0 ? '0.3' : '1';
  var icons = ['🅐','🅑','🅒','🅓'];
  // DOM 노드 완전 교체 — 사파리 버튼 상태 초기화
  var oldC = document.getElementById('q-options');
  var newC = document.createElement('div');
  newC.className = 'options';
  newC.id = 'q-options';
  oldC.parentNode.replaceChild(newC, oldC);
  for (var i = 0; i < q.opts.length; i++) {
    (function(opt, idx) {
      var btn = document.createElement('button');
      btn.className = 'opt';
      btn.type = 'button';
      btn.innerHTML = '<span class="opt-icon">' + icons[idx] + '</span><span style="color:#1a1a1a;-webkit-text-fill-color:#1a1a1a">' + opt.t + '</span>';
      btn.onclick = function() {
        hist.push({q: cur, s: opt.s});
        var keys = Object.keys(opt.s);
        for (var k = 0; k < keys.length; k++) sc[keys[k]] += opt.s[keys[k]];
        cur++;
        if (cur < qs.length) render(); else showResult();
      };
      newC.appendChild(btn);
    })(q.opts[i], i);
  }
}

function goBack() {
  if (!hist.length) return;
  var last = hist.pop();
  var keys = Object.keys(last.s);
  for (var k = 0; k < keys.length; k++) sc[keys[k]] -= last.s[keys[k]];
  cur = last.q;
  render();
}

function showResult() {
  var entries = Object.keys(sc).map(function(k) { return [k, sc[k]]; });
  entries.sort(function(a,b) { return b[1]-a[1]; });
  var top = entries[0][0];
  var t = types[top];
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  document.getElementById('r-top').className = 'result-top' + (t.good ? ' good' : '');
  document.getElementById('r-emoji').textContent = t.emoji;
  document.getElementById('r-label').textContent = t.label;
  document.getElementById('r-type').textContent = t.name;
  document.getElementById('r-desc').textContent = t.desc;
  var cta = document.getElementById('r-cta');
  if (t.good) {
    document.getElementById('r-good-msg').style.display = 'block';
    document.getElementById('r-good-title').textContent = t.goodTitle;
    document.getElementById('r-good-desc').textContent = t.goodDesc;
    document.getElementById('r-cards').style.display = 'none';
    cta.className = 'cta soft';
    document.getElementById('r-cta-sub').textContent = '더 정밀하게 내 몸을 알고 싶다면';
    document.getElementById('r-cta-main').textContent = '→ 웰니스PT 상담 신청';
  } else {
    document.getElementById('r-good-msg').style.display = 'none';
    document.getElementById('r-cards').style.display = 'block';
    var sym = '';
    for (var i=0;i<t.symptoms.length;i++) sym += '<div class="card-item"><span class="dot-green"></span><span style="color:#1a1a1a;-webkit-text-fill-color:#1a1a1a">' + t.symptoms[i] + '</span></div>';
    document.getElementById('r-symptoms').innerHTML = sym;
    var iss = '';
    for (var i=0;i<t.issues.length;i++) iss += '<div class="card-item"><span class="dot-amber"></span><span style="color:#1a1a1a;-webkit-text-fill-color:#1a1a1a">' + t.issues[i] + '</span></div>';
    document.getElementById('r-issues').innerHTML = iss;
    cta.className = 'cta';
    document.getElementById('r-cta-sub').textContent = '내 몸을 스스로 이해하고 함께 관리하기 위해';
    document.getElementById('r-cta-main').textContent = '→ 웰니스PT 상담 신청';
  }
}

function restart() {
  cur = 0; hist = [];
  var keys = Object.keys(sc);
  for (var k=0;k<keys.length;k++) sc[keys[k]] = 0;
  document.getElementById('quiz-view').style.display = 'block';
  document.getElementById('result-view').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
